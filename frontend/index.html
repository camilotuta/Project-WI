<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GYMARK.co</title>
    <link rel="icon" type="image/png" href="assets/images/icons/gmk.png" />
    <link rel="apple-touch-icon" href="assets/images/icons/gmk.png" />
    <link rel="stylesheet" href="css/main.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap");

      body {
        margin: 0;
        padding: 0;
        font-family: "Barlow", "Arial", sans-serif;
        background: linear-gradient(135deg, #070709 0%, #2c2c2e 100%);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .redirect-container {
        text-align: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 40px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }

      .logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        font-weight: 400;
        letter-spacing: 0.05em;
        margin-bottom: 20px;
        color: #fefefe;
      }

      .loading-text {
        font-size: 1rem;
        font-weight: 500;
        margin-bottom: 30px;
        opacity: 0.75;
        letter-spacing: 0.02em;
      }

      .spinner {
        width: 44px;
        height: 44px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top: 3px solid #fefefe;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        margin: 0 auto 20px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .redirect-info {
        font-size: 0.85rem;
        opacity: 0.5;
        letter-spacing: 0.03em;
      }
    </style>
    <!-- <script type="module" async src="https://static.rocket.new/rocket-web.js?_cfg=https%3A%2F%2Fgreenhouse5266back.builtwithrocket.new&_be=https%3A%2F%2Fapplication.rocket.new&_v=0.1.9"></script>
  <script type="module" defer src="https://static.rocket.new/rocket-shot.js?v=0.0.1"></script> -->
  </head>
  <body>
    <div class="redirect-container">
      <div class="logo">GYMARK.co</div>
      <div class="loading-text">Tu tienda de fitness</div>
      <div class="spinner"></div>
      <div class="redirect-info">Cargando...</div>
    </div>

    <script>
      // Redirect to homepage after 2 seconds
      setTimeout(function () {
        window.location.href = "pages/homepage.html";
      }, 2000);

      // Fallback redirect if user clicks anywhere
      document.addEventListener("click", function () {
        window.location.href = "pages/homepage.html";
      });
    </script>
  </body>
</html>
